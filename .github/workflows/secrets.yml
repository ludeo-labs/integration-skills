name: secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-secrets:
    # Fast, zero-dependency scan of the repo's tracked files (same scanner the pre-commit hook uses).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/scan-secrets.mjs --all